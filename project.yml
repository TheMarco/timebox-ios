name: TimeboxiOS
options:
  bundleIdPrefix: com.themarco
  deploymentTarget:
    iOS: "16.0"
packages:
  TimeboxStudio:
    path: ../TimeBox
targets:
  TimeboxiOS:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: TimeboxStudio
        product: TimeboxKit
      - package: TimeboxStudio
        product: TimeboxBluetooth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.themarco.timebox-ios
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Connects to your Timebox over Bluetooth to send images and colors."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
