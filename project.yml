name: TimeboxiOS
options:
  bundleIdPrefix: com.themarco
  deploymentTarget:
    iOS: "17.0"
packages:
  TimeboxStudio:
    path: ../TimeBox
targets:
  TimeboxiOS:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: TimeboxStudio
        product: TimeboxKit
      - package: TimeboxStudio
        product: TimeboxBluetooth
    info:
      path: TimeboxiOS-Info.plist
      properties:
        CFBundleDisplayName: Pixel Labs
        UILaunchScreen: {}
        UIBackgroundModes: [bluetooth-central]
        NSBluetoothAlwaysUsageDescription: "Connects to your Timebox over Bluetooth to send images and colors."
        NSMicrophoneUsageDescription: "Listens to nearby music so Shazam can identify it and show the album art on your Timebox."
        NSAppleMusicUsageDescription: "Reads what's playing in your Music app to show the album art on your Timebox."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.themarco.timebox-ios
        DEVELOPMENT_TEAM: "3ML6V62AF5"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
